        <button id="copy-code-btn" class="paste-btn" title="Copy code to clipboard" disabled>📄 Copy Code</button>

      <textarea id="pipeline-input" placeholder="pipeline { ... }" rows="15"></textarea>
      <div class="controls">
        <button id="visualize-btn">Visualize</button>
        <button id="simulate-btn" disabled>Simulate Dry-Run</button>

    <section class="output-section">

  <script>
    // Initialize share functionality
    const shareButton = document.getElementById('share-tool-button');
    const desktopShareButtons = document.getElementById('desktop-share-buttons');
    const shareUrl = window.location.href;
    const shareTitle = 'Jenkins Pipeline Visualizer Pro | LiDa Software';
    const shareText = 'Check out this free Jenkins Pipeline Visualizer tool from LiDa Software!';

    // Show appropriate share UI based on device/browser support
    if (navigator.share && /Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
      // Mobile with Web Share API support
      shareButton.style.display = 'inline-flex';
      shareButton.addEventListener('click', async () => {
        try {
          await navigator.share({
            title: shareTitle,
            text: shareText,
            url: shareUrl
          });
        } catch (err) {
          if (err.name !== 'AbortError') {
            console.log('Share failed:', err);
          }
        }
      });
    } else {
      // Desktop - show social media buttons
      desktopShareButtons.style.display = 'flex';

      // Facebook share
      document.getElementById('share-facebook').addEventListener('click', (e) => {
        e.preventDefault();
        window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}`, '_blank', 'width=600,height=400');
      });

      // LinkedIn share
      document.getElementById('share-linkedin').addEventListener('click', (e) => {
        e.preventDefault();
        window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(shareUrl)}`, '_blank', 'width=600,height=400');
      });

      // Twitter/X share
      document.getElementById('share-twitter').addEventListener('click', (e) => {
        e.preventDefault();
        window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(shareUrl)}&text=${encodeURIComponent(shareText)}`, '_blank', 'width=600,height=400');
      });

      // Copy link
      document.getElementById('share-copy').addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(shareUrl);
          const btn = document.getElementById('share-copy');
          const originalHTML = btn.innerHTML;
          btn.innerHTML = '<svg style="width: 16px; height: 16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> Copied!';
          setTimeout(() => {
            btn.innerHTML = originalHTML;
          }, 2000);
        } catch (err) {
          console.error('Failed to copy:', err);
          alert('Link: ' + shareUrl);
        }
      });
    }
  </script>
